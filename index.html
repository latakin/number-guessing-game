<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="top-div">
      <button class="reset-button">Again!</button>
      <p><< Between 1 and 20 >></p>
    </div>
    <div class="second-div">
      <h1>Guess My Number</h1>
      <hr />
      <p class="secret-number">?</p>
    </div>
    <div class="last-div">
      <div class="form-div">
        <input type="number" id="myvalue" />
        <button class="play-button">Check</button>
      </div>
      <div class="game-info">
        <p class="game-message">Start guessing...</p>
        <p>💯 Score: <span class="current-score">20</span></p>
        <p>🥇 Highscore: <span class="Highscore">0</span></p>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
